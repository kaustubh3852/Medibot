<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot - AI Healthcare Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow" id="chat-container">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0"> MediBot</h4>
            <small>Your AI Healthcare Assistant</small>
        </div>
        <div class="card-body p-3" id="chat-box">
            <div class="bot-msg mb-2">
                <span>Hi! I'm MediBot 👋 How can I help you today?</span>
            </div>
        </div>
        <div class="card-footer bg-white border-top">
            <div class="input-group">
                <input type="text" id="user-input" class="form-control" placeholder="Type your health query..." />
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
            <p class="text-muted text-center mt-2 mb-0" style="font-size: 11px;">⚠️ Not a substitute for professional medical advice.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value.trim();
            if (!message) return;
            addMessage(message, "user");
            input.value = "";
            addMessage("Typing...", "bot", "typing");
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            removeTyping();
            addMessage(data.reply, "bot");
        }
        function addMessage(text, sender, id = "") {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = sender === "user" ? "user-msg mb-2" : "bot-msg mb-2";
            if (id) div.id = id;
            div.innerHTML = `<span>${text}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function removeTyping() {
            const el = document.getElementById("typing");
            if (el) el.remove();
        }
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
